name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: node-${{ matrix.node-version }}
    strategy:
      fail-fast: false
      matrix:
        # https://nodejs.org/en/about/previous-releases#nodejs-releases
        node-version: [22, 24, 25]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - run: make check

  release:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: test
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Check package.json version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Error: tag ${TAG} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - run: pnpm run build

      - name: Extract changelog entry
        run: |
          VERSION="${{ github.ref_name }}"
          NOTES=$(awk "/^## ${VERSION}/{found=1; next} /^## /{found=0} found" changelog.md)
          if [ -z "$NOTES" ]; then
            echo "Error: no changelog entry found for ${VERSION}"
            exit 1
          fi
          echo "$NOTES" > "${RUNNER_TEMP}/release_notes.txt"

      # Work around pnpm tag releases failing in detached HEAD:
      # https://github.com/pnpm/pnpm/issues/5894
      - run: pnpm publish --provenance --access public --no-git-checks

      - run: gh release create ${{ github.ref_name }} --title ${{ github.ref_name }} --notes-file "${RUNNER_TEMP}/release_notes.txt"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
